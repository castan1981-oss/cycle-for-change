name: CfC Content Loop

on:
  schedule:
    - cron: "0 16 * * 1"     # Mondays 9am Phoenix (UTC-7, no DST)
  workflow_dispatch: {}        # manual "Run workflow" button for testing

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  content-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 30 --allowedTools "Read,Write,Edit,Bash(git:*),Bash(gh:*)"'
          prompt: |
            You are running one turn of the Cycle for Change content loop.
            Follow CLAUDE.md at all times. This is a hand-written STATIC site:
            new pages are self-contained HTML files, NOT markdown, and nothing
            renders a /content folder. Do not touch index.html or its inline JS.

            GOAL: grow organic traffic to cycleforchange.org around
            cycling/endurance, queer mental health, and the 7,500-mile pledge.
            Mission first.

            1. READ /loop-state.json. Never repeat anything in "shipped" or
               "do_not_repeat".
            2. DISCOVER: propose 5 content opportunities (questions people search,
               training or pledge milestones, a timely peg, or a backlog item).
               Tag each with topic, type, and rough value.
            3. DECIDE: score by (search demand x mission fit x freshness) / effort.
               Pick ONE. Show the math briefly.
            4. DRAFT: copy /guides/_template.html to the new page path and fill in
               every {{PLACEHOLDER}}:
                 - guide -> /guides/<slug>/index.html
                 - short note -> /notes/<slug>/index.html
               The <slug> is kebab-case. The page must keep the shared stylesheet
               link (/guides/guides.css), the nav, and the footer unchanged.
               Set the canonical URL, og:url, and JSON-LD url to
               https://cycleforchange.org/<guides|notes>/<slug>/ .
               Robert's voice — short sentences, anti-polish, no buzzwords.
               If the page is NOT about mental health, delete the crisis block.
            5. VERIFY: run the full checklist from CLAUDE.md (voice, blocklist,
               YMYL safety + crisis line where relevant, SEO: target query in
               <title>/<h1>/<h2> + meta description + canonical, GEO: filled
               .geo-hook + JSON-LD, brand, at least one internal link to /#board).
               Confirm no {{PLACEHOLDER}} tokens remain. Show pass/fail per item.
               If anything fails and you can't fix it in one pass, open the PR as
               a DRAFT explaining why.
            6. UPDATE /loop-state.json: append the new item to "shipped" with
               status "drafted" (include slug, title, target_query, type, and the
               page path), and add its target_query to "do_not_repeat".
            7. Create a new branch, commit your changes, and open a pull request
               with `gh pr create`. Do NOT push to main. Do NOT merge. The PR body
               must include the verify checklist results, the live URL the page
               will have after merge, and the 3 decisions Robert owns:
               (a) voice pass y/n, (b) publish y/n, (c) which org to spotlight this
               cycle (LA LGBT Center / SF AIDS Foundation / one·n·ten).
